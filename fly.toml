app = "spinrate-sales-penetration"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8050
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
